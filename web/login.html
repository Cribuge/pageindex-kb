<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理登录 - PageIndex</title>
    <style>
        :root {
            --bg: #0d2a5f;
            --accent: #2563eb;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 8px;
            --radius-lg: 12px;
            --transition: all 0.2s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1e3a6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
        }
        .login-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin: 0 auto 24px;
        }
        .login-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }
        .login-btn:hover { background: #1d4ed8; }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            transition: var(--transition);
        }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">P</div>
        <h1 class="login-title">管理登录</h1>
        <p class="login-subtitle">请输入管理员密码访问管理后台</p>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="输入密码" onkeydown="if(event.key==='Enter')login()">
        </div>
        <div class="login-error" id="error"></div>

        <button class="login-btn" id="btn" onclick="login()">登录</button>

        <a href="/" class="back-link">← 返回对话</a>
    </div>

    <script>
        const API = '/api';

        async function login() {
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn');
            const error = document.getElementById('error');
            if (!password) { error.textContent = '请输入密码'; error.style.display = 'block'; return; }
            error.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '登录中...';
            try {
                const res = await fetch(API + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (!res.ok) {
                    error.textContent = data.detail || '密码错误';
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = '登录';
                    return;
                }
                sessionStorage.setItem('admin_token', data.access_token);
                window.location.href = '/admin/';
            } catch (e) {
                error.textContent = '网络错误，请稍后重试';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }
    </script>
</body>
</html>
